{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:3rem;margin-bottom:.5rem">🔐</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700">Вход для библиотекаря</h1>
      <p style="color:var(--ink3);font-size:.9rem;margin-top:.4rem">Панель управления сайтом</p>
    </div>
    {% if error %}
    <div class="alert alert-error">Неверный пароль. Попробуйте снова.</div>
    {% endif %}
    <form method="POST" style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.75rem">
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">
        Войти →
      </button>
    </form>
  </div>
</div>
{% endblock %}
