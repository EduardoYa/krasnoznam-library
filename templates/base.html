<!DOCTYPE html>
<html lang="ru" data-lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Кітапхана{% endblock %} — Библиотека с. Краснознаменное</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== ПЕРЕМЕННЫЕ ТЕМЫ ===== */
:root {
  /* Светлая тема */
  --cream:   #faf7f2;
  --cream2:  #f2ede4;
  --cream3:  #e8e0d0;
  --ink:     #1a1612;
  --ink2:    #3d3530;
  --ink3:    #7a6e65;
  --gold:    #b5892a;
  --gold2:   #d4a43a;
  --blue:    #2a5f8f;
  --blue2:   #3a7ab5;
  --red:     #8f2a2a;
  --border:  rgba(26,22,18,0.12);
  --shadow:  0 2px 20px rgba(26,22,18,0.08);
  --r:       10px;
}

/* Темная тема */
html[data-theme="light"] {
  --cream:   #ffffff;
  --cream2:  #f5f3f0;
  --cream3:  #ede8e0;
  --ink:     #1a1612;
  --ink2:    #3d3530;
  --ink3:    #7a6e65;
  --gold:    #b5892a;
  --gold2:   #d4a43a;
  --blue:    #2a5f8f;
  --blue2:   #3a7ab5;
  --red:     #8f2a2a;
  --border:  rgba(26,22,18,0.08);
  --shadow:  0 2px 20px rgba(26,22,18,0.06);
}

html[data-theme="dark"] {
  --cream:   #0f0e0c;
  --cream2:  #1a1815;
  --cream3:  #242220;
  --ink:     #f5f3f0;
  --ink2:    #d4ccc8;
  --ink3:    #9a8f85;
  --gold:    #c9a648;
  --gold2:   #e0b84a;
  --blue:    #5a8faf;
  --blue2:   #6fa5cf;
  --red:     #bb5a5a;
  --border:  rgba(245,243,240,0.12);
  --shadow:  0 2px 20px rgba(0,0,0,0.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Geologica',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.7;
  min-height:100vh;
  transition:background-color .3s, color .3s;
}
a{color:var(--blue);text-decoration:none;transition:color .2s}
a:hover{color:var(--gold)}
img{max-width:100%;height:auto;display:block}

/* ── NAV ── */
.nav{
  background:var(--ink2);
  position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--gold);
  transition:background-color .3s;
}
.nav-inner{
  max-width:1200px;margin:0 auto;padding:0 1.5rem;
  display:flex;align-items:center;gap:2rem;height:60px;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:700;
  color:var(--cream);white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  letter-spacing:0.01em;
}
.nav-logo span{color:var(--gold2)}
.nav-logo div:last-child {
  display:flex;
  flex-direction:column;
  gap:0;
}
.nav-logo div:last-child div:first-child {
  font-size:.95rem;
}
.nav-logo div:last-child div:last-child {
  font-size:.65rem;
  opacity:.7;
}

.nav-links{display:flex;gap:2px;flex:1}
.nav-links a{
  color:rgba(255,255,255,0.75);font-size:.875rem;font-weight:400;
  padding:6px 12px;border-radius:6px;
  transition:all .2s;letter-spacing:0.02em;
}
.nav-links a:hover,.nav-links a.active{
  color:#fff;background:rgba(255,255,255,.1);
}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.lang-btn{
  background:transparent;border:none;
  color:var(--gold2);font-family:'Geologica',sans-serif;
  font-size:1.3rem;font-weight:500;padding:6px 10px;
  border-radius:6px;cursor:pointer;transition:all .2s;
  letter-spacing:0.05em;
  display:flex;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;
}
.lang-btn:hover{background:rgba(255,255,255,.1);transform:scale(1.1)}

.theme-btn{
  background:transparent;border:none;
  color:var(--gold2);font-family:'Geologica',sans-serif;
  font-size:1.2rem;cursor:pointer;transition:all .2s;
  padding:6px 10px;
  display:flex;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;
}
.theme-btn:hover{background:rgba(255,255,255,.1);transform:scale(1.1)}

.admin-link{
  font-size:.8rem;color:rgba(255,255,255,.4);padding:4px 10px;
  border-radius:6px;transition:all .2s;
}
.admin-link:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.1)}

/* ── LAYOUT ── */
.container{max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem}
.page-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.page-title{
  font-family:'Playfair Display',serif;
  font-size:2.25rem;font-weight:700;color:var(--ink);
  letter-spacing:-0.02em;line-height:1.2;
}
.page-sub{color:var(--ink3);margin-top:.4rem;font-size:.9rem}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 22px;border-radius:var(--r);
  font-family:'Geologica',sans-serif;font-size:.875rem;
  font-weight:500;cursor:pointer;border:none;
  transition:all .2s;text-decoration:none;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2);color:#fff;transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);color:#fff}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(181,137,42,0.25)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink2)}
.btn-outline:hover{background:var(--cream2);border-color:var(--ink3)}
.btn-danger{background:rgba(143,42,42,.15);color:var(--red)}
.btn-danger:hover{background:rgba(143,42,42,.25)}
.btn-sm{padding:8px 12px;font-size:.8rem}

/* ── FORMS ── */
.form-group{margin-bottom:1.25rem}
.form-label{display:block;margin-bottom:.5rem;font-weight:500;font-size:.9rem}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:.95rem;color:var(--ink);transition:all .2s}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,95,143,0.08)}
.form-textarea{resize:vertical;min-height:120px;width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:.95rem;color:var(--ink);transition:all .2s}
.form-textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,95,143,0.08)}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:.9rem}
.form-hint{font-size:.8rem;color:var(--ink3);margin-top:.3rem}

/* ── NEWS GRID ── */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
  gap:1.5rem;
  margin-bottom:2rem;
}
.news-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:all .3s;
  display:flex;
  flex-direction:column;
  height:100%;
}
html[data-theme="dark"] .news-card {
  background:var(--cream2);
}
.news-card:hover{
  border-color:var(--blue);
  box-shadow:var(--shadow);
  transform:translateY(-4px);
}
.news-card-img{
  width:100%;
  height:200px;
  object-fit:cover;
  background:var(--cream2);
}
.news-card-body{
  padding:1.25rem;
  flex:1;
  display:flex;
  flex-direction:column;
}
.news-card-title{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  font-weight:600;
  color:var(--ink);
  margin-bottom:.5rem;
  line-height:1.3;
}
.news-card-meta{
  font-size:.8rem;
  color:var(--ink3);
  margin-bottom:.75rem;
}
.news-card-excerpt{
  color:var(--ink2);
  font-size:.9rem;
  line-height:1.6;
  flex:1;
  margin-bottom:1rem;
}
.news-card-link{
  color:var(--blue);
  font-size:.9rem;
  font-weight:500;
  transition:all .2s;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.news-card-link:hover{
  color:var(--gold);
  gap:8px;
}

/* ── FOOTER ── */
.footer{
  background:var(--ink2);
  color:#fff;
  padding:2rem 1.5rem;
  margin-top:4rem;
  border-top:2px solid var(--gold);
}
.footer-inner{
  max-width:1200px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:1rem;font-size:.82rem;
}
.footer-logo{font-family:'Playfair Display',serif;color:#fff;font-size:1rem;font-weight:600}
.footer-logo span{color:var(--gold2)}

/* ── UTILS ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:500}
.badge-gold{background:rgba(181,137,42,.15);color:var(--gold)}
.badge-blue{background:rgba(42,95,143,.12);color:var(--blue)}
.alert{padding:12px 16px;border-radius:var(--r);font-size:.875rem;margin-bottom:1rem}
.alert-error{background:rgba(143,42,42,.08);border:1px solid rgba(143,42,42,.25);color:var(--red)}
.alert-success{background:rgba(42,95,42,.08);border:1px solid rgba(42,95,42,.25);color:#2a5f2a}
.divider{height:1px;background:var(--border);margin:2rem 0}
.text-muted{color:var(--ink3)}
.text-sm{font-size:.85rem}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .4s both}

.news-card:nth-child(1){animation-delay:.05s}
.news-card:nth-child(2){animation-delay:.1s}
.news-card:nth-child(3){animation-delay:.15s}
.news-card:nth-child(4){animation-delay:.2s}
.news-card:nth-child(5){animation-delay:.25s}
.news-card:nth-child(6){animation-delay:.3s}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s}
.reveal.visible{opacity:1;transform:none}

@media(max-width:768px){
  .nav-inner{padding:0 1rem;gap:1rem}
  .nav-links{display:none}
  .page-title{font-size:1.6rem}
  .news-grid{grid-template-columns:1fr}
  .container{padding:1.5rem 1rem}
}

.mob-menu-btn{
  display:none;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.8);font-size:1.3rem;padding:4px;
}
@media(max-width:768px){.mob-menu-btn{display:block}}
.mob-menu{
  display:none;background:var(--ink2);border-top:1px solid rgba(255,255,255,.1);
  padding:.75rem 1rem;
}
.mob-menu.open{display:block}
.mob-menu a{
  display:block;padding:.75rem;color:rgba(255,255,255,.8);font-size:.9rem;
  transition:color .2s;
}
.mob-menu a:hover{color:#fff}
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">
      <span>📚</span>
      <div>
        <div>Кітапхана</div>
        <div>Библиотека</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="/" class="{% if request.path=='/' %}active{% endif %}" data-ru="Главная" data-kz="Басты бет">Главная</a>
      <a href="/news" class="{% if request.path.startswith('/news') %}active{% endif %}" data-ru="Новости" data-kz="Жаңалықтар">Новости</a>
      <a href="/schedule" class="{% if request.path=='/schedule' %}active{% endif %}" data-ru="График работы" data-kz="Жұмыс кестесі">График работы</a>
      <a href="/about" class="{% if request.path=='/about' %}active{% endif %}" data-ru="О библиотеке" data-kz="Кітапхана туралы">О библиотеке</a>
    </div>
    <div class="nav-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Өз тілін өзгерту / Изменить язык">
        <span id="langFlag">🇷🇺</span>
      </button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Тёмная/светлая тема">
        <span id="themeIcon">🌙</span>
      </button>
      {% if session.get('admin') %}
      <a href="/logout" class="admin-link" data-ru="Выйти" data-kz="Шығу">Выйти</a>
      {% endif %}
      <button class="mob-menu-btn" onclick="toggleMob()">☰</button>
    </div>
  </div>
  <div class="mob-menu" id="mobMenu">
    <a href="/" data-ru="Главная" data-kz="Басты бет">Главная</a>
    <a href="/news" data-ru="Новости" data-kz="Жаңалықтар">Новости</a>
    <a href="/schedule" data-ru="График работы" data-kz="Жұмыс кестесі">График работы</a>
    <a href="/about" data-ru="О библиотеке" data-kz="Кітапхана туралы">О библиотеке</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">📚 <span>Кітапхана</span> — Библиотека</div>
    <div>© 2026 с. Краснознаменное</div>
  </div>
</footer>

<script>
// Язык
let lang = localStorage.getItem('lib_lang') || 'ru';

function toggleLang() {
  lang = lang === 'ru' ? 'kz' : 'ru';
  localStorage.setItem('lib_lang', lang);
  applyLang();
}

function applyLang() {
  document.documentElement.setAttribute('data-lang', lang);
  const flagEl = document.getElementById('langFlag');
  if (flagEl) {
    flagEl.textContent = lang === 'ru' ? '🇰🇿' : '🇷🇺';
  }
  document.querySelectorAll('[data-ru]').forEach(el => {
    el.textContent = lang === 'ru' ? el.dataset.ru : (el.dataset.kz || el.dataset.ru);
  });
}

// Тема
let theme = localStorage.getItem('lib_theme') || 'dark';

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('lib_theme', theme);
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  const themeIcon = document.getElementById('themeIcon');
  if (themeIcon) {
    themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
}

// Мобильное меню
function toggleMob() {
  document.getElementById('mobMenu').classList.toggle('open');
}

// Инициализация
applyLang();
applyTheme();

// Reveal анимация
function observeElements() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}
observeElements();
</script>
</body>
</html>
